<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDK Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        a.nav-item, a.nav-item:link, a.nav-item:visited, a.nav-item:hover, a.nav-item:active, a.nav-item:focus { text-decoration: none !important; }
    </style>
</head>
<body class="admin-page page-dashboard">

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-cube"></i> SDK
        </div>
        <ul class="nav-menu">
            <li><a href="/" class="nav-item active" style="text-decoration:none"><i class="fa-solid fa-chart-pie"></i> Statistics</a></li>
            <li><a href="/Campaigns" class="nav-item" style="text-decoration:none"><i class="fa-solid fa-layer-group"></i> Campaigns</a></li>
            <li><a href="/Audience" class="nav-item" style="text-decoration:none"><i class="fa-solid fa-bullhorn"></i> Audience</a></li>
            <li><a href="/Settings" class="nav-item" style="text-decoration:none"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        
        <header class="header">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-circle-user"></i>
            <i class="fa-solid fa-gear"></i>
        </header>

        <section class="kpi-grid">
            <div class="kpi-card highlight">
                <div class="kpi-title">Total Sent:</div>
                <div class="kpi-value" id="total-sent">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Open Rate:</div>
                <div class="kpi-value" id="open-rate">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Click Rate:</div>
                <div class="kpi-value" id="click-rate">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Active Campaigns:</div>
                <div class="kpi-value" id="active-campaigns">-</div>
            </div>
        </section>

        <section class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Campaign Notifications</div>
                <div class="chart-area">
                    <canvas id="notification-bar-chart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Conversion Rate</div>
                <div class="chart-area">
                    <canvas id="conversion-line-chart"></canvas>
                </div>
            </div>
        </section>

        <section class="table-container">
            <div class="table-header">
                <div>Name</div>
                <div>Status</div>
                <div>Sent</div>
                <div>Opened</div>
                <div>Open Rate</div>
                <div>Clicks</div>
            </div>
            <div id="campaign-table-body">
                <div class="table-row">
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        function formatPercent(value) {
            return value.toFixed(1) + '%';
        }

        function renderCampaignRows(campaigns) {
            const tbody = document.getElementById('campaign-table-body');
            if (!tbody) return;

            if (!campaigns || campaigns.length === 0) {
                tbody.innerHTML = `
                    <div class="table-row">
                        <div class="empty-placeholder" style="grid-column: span 6; text-align:center;">No campaign data available</div>
                    </div>
                `;
                return;
            }

            tbody.innerHTML = campaigns.map(campaign => `
                <div class="table-row">
                    <div>${campaign.name}</div>
                    <div>${campaign.status}</div>
                    <div>${campaign.sent}</div>
                    <div>${campaign.opened}</div>
                    <div>${formatPercent(campaign.open_rate)}</div>
                    <div>${campaign.clicked}</div>
                </div>
            `).join('');
        }

        let barChart = null;
        let lineChart = null;

        function fillDashboardStats(stats) {
            document.getElementById('total-sent').textContent = stats.total_notifications_sent || 0;
            document.getElementById('open-rate').textContent = formatPercent(stats.open_rate || 0);
            document.getElementById('click-rate').textContent = formatPercent(stats.click_rate || 0);
            document.getElementById('active-campaigns').textContent = stats.total_active_campaigns || 0;
        }

        function buildCharts(chartData) {
            const barCtx = document.getElementById('notification-bar-chart');
            const lineCtx = document.getElementById('conversion-line-chart');
            console.log('buildCharts chartData', chartData, 'Chart global', typeof Chart);

            if (!barCtx || !lineCtx) {
                console.error('Chart canvas element missing', barCtx, lineCtx);
                return;
            }

            if (barChart) {
                barChart.destroy();
            }
            if (lineChart) {
                lineChart.destroy();
            }

            const labels = chartData.labels || [];
            const sentData = chartData.sent || [];
            const openData = chartData.open_rates || [];
            const clickData = chartData.click_rates || [];

            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Sent notifications',
                        data: sentData,
                        backgroundColor: 'rgba(94, 211, 176, 0.8)',
                        borderColor: 'rgba(94, 211, 176, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { color: '#333' } },
                        y: { beginAtZero: true, ticks: { color: '#333' } }
                    }
                }
            });

            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Open rate (%)',
                            data: openData,
                            borderColor: 'rgba(0, 123, 255, 0.9)',
                            backgroundColor: 'rgba(0, 123, 255, 0.2)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Click rate (%)',
                            data: clickData,
                            borderColor: 'rgba(255, 99, 132, 0.9)',
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { color: '#333' } },
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#333', callback: value => `${value}%` }
                        }
                    }
                }
            });
        }

        async function loadDashboardData() {
            const routes = ['/api/v1/admin/stats/dashboard', '/api/v1/admin/stats/overview'];
            let payload = null;
            let lastError = null;
            let successfulRoute = null;

            for (const route of routes) {
                try {
                    const response = await fetch(route);
                    if (!response.ok) {
                        const text = await response.text();
                        lastError = `Unable to load dashboard data from ${route} (${response.status}): ${text}`;
                        continue;
                    }
                    payload = await response.json();
                    successfulRoute = route;
                    break;
                } catch (err) {
                    lastError = `Fetch error for ${route}: ${err.message}`;
                }
            }

            if (!payload) {
                throw new Error(lastError || 'Unable to fetch dashboard data');
            }

            const campaigns = (payload.campaign_summary || []).slice();
            campaigns.sort((a, b) => {
                if (a.status !== b.status) {
                    return a.status === 'active' ? -1 : b.status === 'active' ? 1 : 0;
                }
                return a.name.localeCompare(b.name);
            });

            fillDashboardStats(payload.stats || {});
            renderCampaignRows(campaigns);
            buildCharts(payload.chart_data || {});
        }

        async function initDashboard() {
            try {
                await loadDashboardData();
            } catch (error) {
                console.error('Dashboard load error:', error);
                const tbody = document.getElementById('campaign-table-body');
                if (tbody) {
                    tbody.innerHTML = `
                        <div class="table-row">
                            <div class="empty-placeholder" style="grid-column: span 6; text-align:center;">Unable to load data: ${error.message}</div>
                        </div>
                    `;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
