<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDK Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #111c1f;
            --bg-sidebar: #0d1517;
            --bg-card-dark: #172629;
            --bg-white: #ffffff;
            --accent-mint: #5ed3b0;
            --text-light: #ffffff;
            --text-gray: #a0aab2;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            color: var(--text-gray);
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            color: var(--text-light);
        }

        .nav-item.active {
            background-color: var(--accent-mint);
            color: var(--bg-main);
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            font-size: 18px;
            color: var(--text-gray);
            padding-bottom: 10px;
        }
        
        .header i {
            cursor: pointer;
        }

        .debug-banner {
            margin-bottom: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            background: #1e2f34;
            color: #c7f7e9;
            font-size: 14px;
            line-height: 1.4;
        }

        /* KPI Cards Area */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .kpi-card {
            background-color: var(--bg-card-dark);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .kpi-card.highlight {
            background-color: var(--accent-mint);
            color: var(--bg-main);
        }

        .kpi-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-gray);
        }

        .kpi-card.highlight .kpi-title {
            color: var(--bg-main);
            opacity: 0.8;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
        }

        /* Charts Area */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-card {
            background-color: var(--bg-white);
            color: var(--text-dark);
            border-radius: 12px;
            padding: 24px;
            height: 280px;
            display: flex;
            flex-direction: column;
        }

        .chart-area {
            flex: 1 1 0;
            min-height: 0;
        }

        .chart-area canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .chart-placeholder {
            flex: 1;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }

        /* Table Area */
        .table-container {
            background-color: var(--bg-white);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 5px;
        }

        .table-header {
            background-color: var(--bg-card-dark);
            color: var(--text-light);
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
        }

        .table-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            padding: 16px 24px;
            font-size: 14px;
            color: var(--text-dark);
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .table-row:last-child {
            border-bottom: none;
        }
        
        .empty-placeholder {
            color: #ccc;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-cube"></i> SDK
        </div>
        <ul class="nav-menu">
            <li class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Statistics</li>
            <li class="nav-item"><a href="/Campaigns" style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 15px;"><i class="fa-regular fa-user"></i> Campaigns</a></li>
            <li class="nav-item"><i class="fa-solid fa-bullhorn"></i> Audience</li>
            <li class="nav-item"><i class="fa-solid fa-gear"></i> Settings</li>
        </ul>
    </aside>

    <main class="main-content">
        
        <header class="header">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-circle-user"></i>
            <i class="fa-solid fa-gear"></i>
        </header>

        <section class="kpi-grid">
            <div class="kpi-card highlight">
                <div class="kpi-title">Total Sent:</div>
                <div class="kpi-value" id="total-sent">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Open Rate:</div>
                <div class="kpi-value" id="open-rate">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Click Rate:</div>
                <div class="kpi-value" id="click-rate">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Active Campaigns:</div>
                <div class="kpi-value" id="active-campaigns">-</div>
            </div>
        </section>

        <section class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Campaign Notifications</div>
                <div class="chart-area">
                    <canvas id="notification-bar-chart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Conversion Rate</div>
                <div class="chart-area">
                    <canvas id="conversion-line-chart"></canvas>
                </div>
            </div>
        </section>

        <section class="table-container">
            <div class="table-header">
                <div>Name</div>
                <div>Status</div>
                <div>Sent</div>
                <div>Opened</div>
                <div>Open Rate</div>
                <div>Clicks</div>
            </div>
            <div id="campaign-table-body">
                <div class="table-row">
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                    <div class="empty-placeholder">Loading...</div>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        function formatPercent(value) {
            return value.toFixed(1) + '%';
        }

        function renderCampaignRows(campaigns) {
            const tbody = document.getElementById('campaign-table-body');
            if (!tbody) return;

            if (!campaigns || campaigns.length === 0) {
                tbody.innerHTML = `
                    <div class="table-row">
                        <div class="empty-placeholder" style="grid-column: span 6; text-align:center;">No campaign data available</div>
                    </div>
                `;
                return;
            }

            tbody.innerHTML = campaigns.map(campaign => `
                <div class="table-row">
                    <div>${campaign.name}</div>
                    <div>${campaign.status}</div>
                    <div>${campaign.sent}</div>
                    <div>${campaign.opened}</div>
                    <div>${formatPercent(campaign.open_rate)}</div>
                    <div>${campaign.clicked}</div>
                </div>
            `).join('');
        }

        let barChart = null;
        let lineChart = null;

        function fillDashboardStats(stats) {
            document.getElementById('total-sent').textContent = stats.total_notifications_sent || 0;
            document.getElementById('open-rate').textContent = formatPercent(stats.open_rate || 0);
            document.getElementById('click-rate').textContent = formatPercent(stats.click_rate || 0);
            document.getElementById('active-campaigns').textContent = stats.total_active_campaigns || 0;
        }

        function buildCharts(chartData) {
            const barCtx = document.getElementById('notification-bar-chart');
            const lineCtx = document.getElementById('conversion-line-chart');
            console.log('buildCharts chartData', chartData, 'Chart global', typeof Chart);

            if (!barCtx || !lineCtx) {
                console.error('Chart canvas element missing', barCtx, lineCtx);
                return;
            }

            if (barChart) {
                barChart.destroy();
            }
            if (lineChart) {
                lineChart.destroy();
            }

            const labels = chartData.labels || [];
            const sentData = chartData.sent || [];
            const openData = chartData.open_rates || [];
            const clickData = chartData.click_rates || [];

            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Sent notifications',
                        data: sentData,
                        backgroundColor: 'rgba(94, 211, 176, 0.8)',
                        borderColor: 'rgba(94, 211, 176, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { color: '#333' } },
                        y: { beginAtZero: true, ticks: { color: '#333' } }
                    }
                }
            });

            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Open rate (%)',
                            data: openData,
                            borderColor: 'rgba(0, 123, 255, 0.9)',
                            backgroundColor: 'rgba(0, 123, 255, 0.2)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Click rate (%)',
                            data: clickData,
                            borderColor: 'rgba(255, 99, 132, 0.9)',
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { color: '#333' } },
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#333', callback: value => `${value}%` }
                        }
                    }
                }
            });
        }

        async function loadDashboardData() {
            const routes = ['/api/v1/admin/stats/dashboard', '/api/v1/admin/stats/overview'];
            let payload = null;
            let lastError = null;
            let successfulRoute = null;

            for (const route of routes) {
                try {
                    const response = await fetch(route);
                    if (!response.ok) {
                        const text = await response.text();
                        lastError = `Unable to load dashboard data from ${route} (${response.status}): ${text}`;
                        continue;
                    }
                    payload = await response.json();
                    successfulRoute = route;
                    break;
                } catch (err) {
                    lastError = `Fetch error for ${route}: ${err.message}`;
                }
            }

            if (!payload) {
                throw new Error(lastError || 'Unable to fetch dashboard data');
            }

            const campaigns = (payload.campaign_summary || []).slice();
            campaigns.sort((a, b) => {
                if (a.status !== b.status) {
                    return a.status === 'active' ? -1 : b.status === 'active' ? 1 : 0;
                }
                return a.name.localeCompare(b.name);
            });

            fillDashboardStats(payload.stats || {});
            renderCampaignRows(campaigns);
            buildCharts(payload.chart_data || {});
        }

        async function initDashboard() {
            try {
                await loadDashboardData();
            } catch (error) {
                console.error('Dashboard load error:', error);
                const tbody = document.getElementById('campaign-table-body');
                if (tbody) {
                    tbody.innerHTML = `
                        <div class="table-row">
                            <div class="empty-placeholder" style="grid-column: span 6; text-align:center;">Unable to load data: ${error.message}</div>
                        </div>
                    `;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
